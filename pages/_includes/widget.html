<div id="webring-{{ preferences.ringName }}-widget" class="_wrongoInternalWidget">
    <style>
        #webring-{{ preferences.ringName }}-widget div {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            text-align: center;
        }
        
        #webring-{{ preferences.ringName }}-widget p {
            margin: 0;
            padding: 0.4em;
            border: 2px solid black;
        }
        
        #webring-{{ preferences.ringName }}-widget a {
            margin: 0;
            padding: 0.2em;
            border: 2px solid black;
            border-top: 0;
        }
        
        #webring-{{ preferences.ringName }}-widget a:first-child {
            border-right: 0;
        }
        
        #webring-{{ preferences.ringName }}-widget a:last-child {
            border-left: 0;
        }
    </style>
    <p>This site is a member of the {{ preferences.ringName }} webring.</p>
    <div>
        <a href="{{ preferences.ringAddress }}/redirect?action=previous&current={address}">Previous Site</a>
        <a href="{{ preferences.ringAddress }}">About</a>
        <a href="{{ preferences.ringAddress }}/redirect?action=next&current={address}">Next Site</a>
    </div>
</div>
